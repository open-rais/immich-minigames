version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: immich-minigames-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-immich_minigames}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immich-minigames

  redis:
    image: redis:7-alpine
    container_name: immich-minigames-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - immich-minigames

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: immich-minigames-backend
    environment:
      DEBUG: ${DEBUG:-true}
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-immich_minigames}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - immich-minigames

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: immich-minigames-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    networks:
      - immich-minigames
    # For development with hot reload, uncomment below and comment out the production Dockerfile
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    #   - /app/.next
    # command: npm run dev

volumes:
  postgres_data:

networks:
  immich-minigames:
    driver: bridge

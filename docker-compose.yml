#
# Development stack: Immich (server + ML + Postgres + Redis) for immich-minigames to develop against.
# This does NOT include the minigames backend/frontend (not implemented yet, see CLAUDE.md) -
# it only stands up the upstream Immich instance whose Postgres DB and Immich-ML this app reuses.
#
# Usage: docker compose up -d
# Then open http://localhost:2283 to finish the Immich setup wizard and import photos.
#

name: immich-minigames-dev

services:
  immich-server:
    container_name: immich-minigames-immich-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    ports:
      - '2283:2283'
    depends_on:
      - redis
      - database
    restart: unless-stopped
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-minigames-immich-ml
    # -cuda tag for NVIDIA GPU acceleration (requires NVIDIA Container Toolkit on the host)
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
    volumes:
      - model-cache:/cache
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      disable: false

  redis:
    container_name: immich-minigames-redis
    image: docker.io/valkey/valkey:9@sha256:4963247afc4cd33c7d3b2d2816b9f7f8eeebab148d29056c2ca4d7cbc966f2d9
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  database:
    container_name: immich-minigames-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    # Exposed on the host so the minigames backend can connect to Immich's own DB directly.
    ports:
      - '5432:5432'
    shm_size: 128mb
    restart: unless-stopped
    healthcheck:
      disable: false

volumes:
  model-cache:

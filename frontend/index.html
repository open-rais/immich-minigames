<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Keep in sync with STORAGE_KEY in src/theme/ThemeProvider.tsx. Runs synchronously before
      // any stylesheet/JS, so the correct .dark/.light class is on <html> before first paint -
      // avoids a flash of the wrong theme. Mirrors Immich's own web app (class-on-<html> +
      // localStorage), minus its JSON.parse quirk since we store a plain string, not JSON.
      ;(function () {
        var KEY = "minigames-theme"
        var stored = localStorage.getItem(KEY)
        var preference = stored === "light" || stored === "dark" ? stored : "system"
        var resolved =
          preference === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
            : preference
        document.documentElement.classList.add(resolved)
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Immich Minigames</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

#
# Packaged app stack: pulls the immich-minigames backend/frontend images from GHCR and runs them.
# This does NOT stand up Immich itself - it expects an already-running Immich instance (either
# this repo's own dev docker-compose.yml, or your own separate Immich deployment) and just needs
# DB_HOST/IMMICH_SERVER_URL below pointed at wherever that instance's Postgres/API actually live.
#
# Usage: docker compose -f docker-compose.app.yml up -d
# Then open http://localhost:${FRONTEND_PORT:-3000}.
#
# `db-init` runs once before `backend` and provisions both the scoped Postgres role the backend
# actually runs as AND this app's own database (see backend/src/scripts/bootstrap_db_role.py) -
# it's the only thing in this stack that ever sees Immich's admin DB credentials
# (DB_USERNAME/DB_PASSWORD), and it exits immediately after. `backend` never receives those - only
# its own scoped DB_APP_USERNAME role.
#
# This app's tables live in their own database (DB_APP_DATABASE_NAME), never inside Immich's:
# Immich's `pg_dump` backup is scoped to its own database, so tables kept in there end up in
# Immich's dumps and break its restore. Installs predating that split are migrated automatically
# by db-init on first run.
#
# Re-run it standalone any time DB_APP_PASSWORD changes, or after restoring an Immich backup
# taken before the split (which resurrects the old schema):
#   docker compose -f docker-compose.app.yml run --rm db-init
#

name: immich-minigames-app

services:
  db-init:
    image: ghcr.io/open-rais/immich-minigames-backend:${MINIGAMES_VERSION:-edge}
    # `-m` rather than a file path: running the file directly puts src/scripts/ on sys.path
    # instead of src/, which breaks the script's own `from scripts.migrate_legacy_schema import`.
    command: ['uv', 'run', 'python', '-m', 'scripts.bootstrap_db_role']
    environment:
      PYTHONPATH: /app/src
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      DB_APP_DATABASE_NAME: ${DB_APP_DATABASE_NAME:-minigames}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_APP_USERNAME: ${DB_APP_USERNAME}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: 'no'

  backend:
    image: ghcr.io/open-rais/immich-minigames-backend:${MINIGAMES_VERSION:-edge}
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      # Explicit allow-list, not `env_file: .env` - this container must never receive Immich's
      # admin DB credentials (DB_USERNAME/DB_PASSWORD), only db-init above does.
      # DB_HOST/IMMICH_SERVER_URL override the .env file's host-oriented defaults: "localhost"
      # from inside this container means the container itself, not your machine. If Immich is
      # running on this same machine (e.g. via this repo's own docker-compose.yml),
      # host.docker.internal reaches it through the extra_hosts entry below and its
      # already-published ports (5432, 2283).
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      DB_APP_DATABASE_NAME: ${DB_APP_DATABASE_NAME:-minigames}
      DB_APP_USERNAME: ${DB_APP_USERNAME}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      IMMICH_SERVER_URL: ${IMMICH_SERVER_URL:-http://host.docker.internal:2283}
      IMMICH_API_KEY: ${IMMICH_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  frontend:
    image: ghcr.io/open-rais/immich-minigames-frontend:${MINIGAMES_VERSION:-edge}
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: '8000'
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-3000}:80'
    restart: unless-stopped
